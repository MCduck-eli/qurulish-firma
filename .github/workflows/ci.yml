name: Full-stack CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    backend-check:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./qurulish-backend
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
            - run: npm install
            - run: npm run build --if-present
    frontend-check:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./qurulish-frontend
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
            - run: npm install
            - run: npm run build
